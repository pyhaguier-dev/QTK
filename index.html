function nextIndex(i){

    return (
        i + 1
    ) % numbers.length;
}

function prevIndex(i){

    return (
        i - 1 +
        numbers.length
    ) % numbers.length;
}
function createTopItem(){

    let newIndex;

    if(
        sphereItems.length === 0
    ){
        newIndex = 0;
    }
    else{

        newIndex =
            nextIndex(
                sphereItems[0].index
            );
    }

    sphereItems.unshift({

        index:
            newIndex,

        value:
            String(
                numbers[newIndex]
            ),

        color:
            colors[colorIndex],

        level : 0

    });

    colorIndex =
        (colorIndex + 1)
        %
        colors.length;
}

// ======================================
// FULLSCREEN
// ======================================

function enterFullscreen(){

    if(
      !document.fullscreenElement
    ){

        document
        .documentElement
        .requestFullscreen()
        .catch(()=>{});
    }
}

document.addEventListener(
    "click",
    enterFullscreen,
    {once:true}
);

document.addEventListener(
    "touchstart",
    enterFullscreen,
    {once:true}
);

let wakeLock = null;

async function keepScreenAwake() {
    try {
        wakeLock = await navigator.wakeLock.request("screen");

        wakeLock.addEventListener("release", () => {
            console.log("Wake Lock released");
        });

        console.log("Screen Wake Lock active");

    } catch (err) {
        console.log("Wake Lock error:", err);
    }
}

document.addEventListener("visibilitychange", async () => {

    if (
        wakeLock !== null &&
        document.visibilityState === "visible"
    ) {
        await keepScreenAwake();
    }

});
